    <div id="id_dbg" style="position:fixed;bottom:0;left:0;right:0;max-height:30vh;overflow-y:auto;background:rgba(0,0,0,0.75);color:#0f0;font-size:11px;padding:4px;z-index:9999;pointer-events:none;"></div>

    <script src="https://unpkg.com/itp-molib@0.1.28/dist/moLib.umd.js?v=68"></script>

    <script>
      let loaderCount = 0;
      function startLoader() {
        id_loader.style.display = 'block';
        loaderCount++;
      }
      function stopLoader() {
        loaderCount--;
        if (loaderCount == 0) id_loader.style.display = 'none';
      }
      function dbg(msg) {
        let d = document.getElementById('id_dbg');
        if (d) d.innerHTML = msg + '<br>' + d.innerHTML;
        console.log('[dbg]', msg);
      }
      window.onerror = (msg, src, line) => dbg('ERR ' + msg + ' L' + line);
      window.addEventListener('unhandledrejection', e => dbg('REJ ' + e.reason));
    </script>
